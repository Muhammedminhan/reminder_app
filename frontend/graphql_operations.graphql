# ---- Reminder Mutations ----

mutation CreateReminder(
  $title: String!
  $description: String
  $senderEmail: String!
  $senderName: String
  $receiverEmail: String!
  $intervalType: String
  $reminderStartDate: DateTime
  $reminderEndDate: DateTime
  $phoneNo: String
  $active: Boolean
  $completed: Boolean
  $visibleToDepartment: Boolean
) {
  createReminder(
    title: $title
    description: $description
    senderEmail: $senderEmail
    senderName: $senderName
    receiverEmail: $receiverEmail
    intervalType: $intervalType
    reminderStartDate: $reminderStartDate
    reminderEndDate: $reminderEndDate
    phoneNo: $phoneNo
    active: $active
    completed: $completed
    visibleToDepartment: $visibleToDepartment
  ) {
    ok
    reminder {
      id
      title
      active
      visibleToDepartment
    }
  }
}

mutation UpdateReminder(
  $id: ID!
  $title: String
  $description: String
  $senderEmail: String
  $senderName: String
  $receiverEmail: String
  $intervalType: String
  $reminderStartDate: DateTime
  $reminderEndDate: DateTime
  $phoneNo: String
  $active: Boolean
  $send: Boolean
  $completed: Boolean
) {
  updateReminder(
    id: $id
    title: $title
    description: $description
    senderEmail: $senderEmail
    senderName: $senderName
    receiverEmail: $receiverEmail
    intervalType: $intervalType
    reminderStartDate: $reminderStartDate
    reminderEndDate: $reminderEndDate
    phoneNo: $phoneNo
    active: $active
    send: $send
    completed: $completed
  ) {
    ok
    reminder {
      id
      title
      active
    }
  }
}

mutation DeleteReminder($id: ID!) {
  deleteReminder(id: $id) {
    ok
  }
}

