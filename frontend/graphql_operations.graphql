# ---- User Role Assignment Mutations ----

mutation AssignRoleToUser(
  $userId: ID!
  $roleId: ID!
  $notes: String
) {
  assignRoleToUser(
    userId: $userId
    roleId: $roleId
    notes: $notes
  ) {
    ok
    userRole {
      id
      isActive
      assignedAt
      notes
      user {
        id
        username
      }
      role {
        id
        name
      }
      company {
        id
        name
      }
    }
  }
}

mutation RemoveRoleFromUser(
  $userId: ID!
  $roleId: ID!
) {
  removeRoleFromUser(
    userId: $userId
    roleId: $roleId
  ) {
    ok
  }
}

