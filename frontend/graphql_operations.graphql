# GraphQL operations for NotifyHub frontend
# Usage: Send to POST /graphql/ with header Authorization: Bearer <access_token>
# All operations require authentication unless otherwise noted

# ============================================
#     QUERIES (18 total)
# ============================================

# ---- User Queries ----

query Me {
  me {
    id
    username
    email
    firstName
    lastName
    isActive
    dateJoined
    company {
      id
      name
      email
      website
      address
      taxIdentification
    }
    department {
      id
      name
      company {
        id
        name
      }
    }
    roles {
      id
      name
      description
      isActive
      isSystemRole
      permissionCount
      permissions {
        id
        code
        name
        category
      }
    }
    permissions
  }
}

query Users {\
  users {
    id
    username
    email
    firstName
    lastName
    isActive
    dateJoined
    company {
      id
      name
    }
    department {
      id
      name
    }
  }
}

query User($id: ID!) {
  user(id: $id) {
    id
    username
    email
    firstName
    lastName
    isActive
    dateJoined
    company {
      id
      name
      email
      website
    }
    department {
      id
      name
    }
  }
}

