# ---- Scheduled Task Queries ----

query ScheduledTasks($taskType: String, $isCompleted: Boolean) {
  scheduledTasks(taskType: $taskType, isCompleted: $isCompleted) {
    id
    taskType
    taskData
    scheduledAt
    executedAt
    isCompleted
    createdAt
    company {
      id
      name
    }
  }
}

query ScheduledTask($id: ID!) {
  scheduledTask(id: $id) {
    id
    taskType
    taskData
    scheduledAt
    executedAt
    isCompleted
    createdAt
    company {
      id
      name
    }
  }
}

# ---- Permission Queries ----

query Permissions($category: String) {
  permissions(category: $category) {
    id
    code
    name
    category
    description
    isActive
    createdAt
    updatedAt
  }
}

query Permission($id: ID, $code: String) {
  permission(id: $id, code: $code) {
    id
    code
    name
    category
    description
    isActive
    createdAt
    updatedAt
  }
}

query MyPermissions {
  myPermissions
}

# ---- Role Queries ----

query Roles($company: ID) {
  roles(company: $company) {
    id
    name
    description
    isActive
    isSystemRole
    permissionCount
    createdAt
    updatedAt
    company {
      id
      name
    }
    createdBy {
      id
      username
    }
    permissions {
      id
      code
      name
      category
    }
  }
}

query Role($id: ID!) {
  role(id: $id) {
    id
    name
    description
    isActive
    isSystemRole
    permissionCount
    createdAt
    updatedAt
    company {
      id
      name
    }
    createdBy {
      id
      username
    }
    permissions {
      id
      code
      name
      category
      description
    }
  }
}

query MyRoles {
  myRoles {
    id
    name
    description
    isActive
    isSystemRole
    permissionCount
    permissions {
      id
      code
      name
      category
    }
  }
}

# ---- User Role Assignment Queries ----

query UserRoles($user: ID, $company: ID) {
  userRoles(user: $user, company: $company) {
    id
    isActive
    assignedAt
    notes
    user {
      id
      username
      email
    }
    role {
      id
      name
      description
    }
    company {
      id
      name
    }
    assignedBy {
      id
      username
    }
  }
}

